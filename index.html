<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <title>Elements Manager</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>

  <style>
    :root{
      --bg:#020617;
      --panel:#0b1224;
      --card:#0f172a;
      --soft:#111c33;
      --border:#1f2a44;
      --text:#e5e7eb;
      --muted:#9ca3af;
      --accent:#38bdf8;
      --danger:#ef4444;
      --ok:#22c55e;
      --warn:#eab308;
      --shadow:0 18px 40px rgba(0,0,0,.55);
      --radius:14px;
    }
    *{box-sizing:border-box}
    body{
      margin:0; padding:16px;
      font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
      color:var(--text);
      background: radial-gradient(circle at top, #1d4ed8 0, #020617 55%);
    }
    .app{max-width:1200px;margin:0 auto}
    h1{margin:0 0 12px;font-size:1.6rem}
    .row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
    .tabs{display:flex;gap:8px;flex-wrap:wrap;margin:10px 0 14px}
    .tab-btn{
      cursor:pointer;
      padding:7px 12px;
      border-radius:999px;
      border:1px solid var(--border);
      background:#020617cc;
      color:var(--muted);
      display:inline-flex;
      align-items:center;
      gap:8px;
      backdrop-filter: blur(12px);
      transition: all .15s;
      font-size:.92rem;
    }
    .tab-btn .dot{width:8px;height:8px;border-radius:99px;background:var(--border)}
    .tab-btn.active{border-color:var(--accent);color:var(--text);background:#020617;transform:translateY(-1px)}
    .tab-btn.active .dot{background:var(--accent)}
    .tab{display:none}
    .tab.active{display:block}

    .card{
      background:linear-gradient(180deg, rgba(15,23,42,.95), rgba(2,6,23,.92));
      border:1px solid var(--border);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      padding:12px;
    }
    .header{
      display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap;
      margin-bottom:10px;
    }
    .header h2{margin:0;font-size:1rem}
    .pill{
      font-size:.75rem;
      border:1px solid var(--border);
      border-radius:999px;
      padding:2px 8px;
      color:var(--muted);
    }

    /* Board */
    .board{display:flex;gap:12px;overflow-x:auto;align-items:flex-start;padding-bottom:6px}
    .col{
      min-width:240px;
      background:linear-gradient(180deg, rgba(17,28,51,.9), rgba(2,6,23,.8));
      border:1px solid var(--border);
      border-radius:12px;
      padding:8px;
    }
    .col[data-special="todo"]{border-color:#ef4444bb;background:linear-gradient(180deg,#450a0a,#020617)}
    .col[data-special="doing"]{border-color:#eab308bb;background:linear-gradient(180deg,#422006,#020617)}
    .col[data-special="done"]{border-color:#22c55ebb;background:linear-gradient(180deg,#064e3b,#020617)}
    .col-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
    .col-title{font-weight:650;font-size:.92rem}
    .badge{font-size:.72rem;border:1px solid #ffffff22;border-radius:999px;padding:2px 6px;color:var(--muted)}
    .tasks{min-height:42px}

    .task{
      background:#020617ee;
      border:1px solid #ffffff14;
      border-radius:11px;
      padding:7px 8px;
      margin-bottom:7px;
      cursor:grab;
      transition:border-color .12s;
    }
    .task:hover{border-color:var(--accent)}
    .task-top{display:flex;justify-content:space-between;gap:6px;align-items:center}
    .task-title{font-weight:600;font-size:.88rem}
    .task-actions{display:flex;gap:6px}
    .icon{
      border:none;background:transparent;cursor:pointer;
      color:var(--muted);font-size:.9rem;padding:0
    }
    .icon.danger{color:var(--danger)}
    .icon.archive{color:var(--ok)}
    .task-desc{
      margin-top:4px;
      font-size:.8rem;
      color:var(--muted);
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    /* Forms */
    .form{
      margin-top:10px;
      display:flex;gap:8px;flex-wrap:wrap;align-items:flex-start
    }
    input, textarea, select{
      background:#020617;
      border:1px solid var(--border);
      color:var(--text);
      border-radius:10px;
      padding:7px 9px;
      font-size:.86rem;
      outline:none;
      flex:1;
      min-width:160px;
    }
    textarea{min-height:62px;resize:vertical}
    button.primary{
      border-radius:999px;
      border:1px solid var(--accent);
      background:#0ea5e9;
      color:#020617;
      font-weight:700;
      padding:7px 12px;
      cursor:pointer;
      font-size:.86rem;
      white-space:nowrap;
    }
    button.primary:hover{filter:brightness(1.08)}

    /* Teams */
    .teams-layout{display:flex;gap:12px;flex-wrap:wrap}
    .teams-left{flex:0 0 240px}
    .teams-right{flex:1;min-width:260px}
    .team-item{
      border:1px solid var(--border);
      border-radius:11px;
      padding:7px 9px;
      cursor:pointer;
      margin-bottom:7px;
      background:rgba(2,6,23,.6);
      display:flex;justify-content:space-between;align-items:center;
    }
    .team-item.active{border-color:var(--accent);background:rgba(2,6,23,.9)}
    .team-head{display:flex;gap:10px;align-items:center;margin-bottom:8px}
    .team-img{
      width:64px;height:64px;border-radius:14px;
      object-fit:cover;background:#020617;border:1px solid var(--border);
    }
    .players{display:flex;flex-wrap:wrap;gap:8px}
    .player{
      min-width:175px;
      border:1px solid var(--border);
      border-radius:12px;
      background:rgba(17,28,51,.85);
      padding:7px 9px;
      cursor:grab;
    }
    .player strong{display:block;font-size:.9rem}
    .player small{color:var(--muted)}
    .avg{
      margin-top:8px;
      color:var(--muted);
      font-size:.85rem;
    }

    /* Templates */
    .tpl-grid{display:flex;gap:8px;flex-wrap:wrap}
    .tpl{
      width:220px;
      border:1px solid var(--border);
      border-radius:12px;
      padding:10px;
      background:rgba(17,28,51,.85);
      cursor:pointer;
    }
    .tpl:hover{border-color:var(--accent)}

    /* Modal */
    .backdrop{
      position:fixed; inset:0;
      background:rgba(2,6,23,.75);
      display:none; align-items:center; justify-content:center;
      z-index:50;
      padding:16px;
    }
    .backdrop.active{display:flex}
    .modal{
      width:100%; max-width:520px;
      background:#020617;
      border:1px solid var(--border);
      border-radius:16px;
      box-shadow:var(--shadow);
      padding:12px;
    }
    .modal header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
    .modal header h3{margin:0;font-size:1rem}
    .close{
      border:1px solid transparent;
      background:transparent;color:var(--muted);
      cursor:pointer;font-size:1.1rem;padding:0 8px;border-radius:999px;
    }
    .close:hover{border-color:var(--border)}
    .modal footer{margin-top:8px;text-align:right}
  </style>
</head>

<body>
  <div class="app">
    <h1>Elements Manager</h1>

    <div class="tabs" id="main-tabs">
      <!-- Wird dynamisch gefüllt -->
    </div>

    <!-- Boards Container -->
    <div id="boards-tab" class="tab active">
      <div class="card">
        <div class="header">
          <h2 id="board-title">Board</h2>
          <div class="pill">To Do rot · Doing gelb · Done grün · + beliebige Listen</div>
        </div>

        <div class="board" id="board"></div>

        <div class="form">
          <input id="new-list-title" placeholder="Neue Liste (z.B. Probleme)" />
          <button class="primary" id="add-list-btn">+ Liste</button>
        </div>

        <div class="form">
          <input id="new-task-title" placeholder="Neue Aufgabe (z.B. Kommunikation)" />
          <textarea id="new-task-desc" placeholder="Beschreibung / Details..."></textarea>
          <select id="new-task-list"></select>
          <button class="primary" id="add-task-btn">+ Aufgabe</button>
        </div>
      </div>
    </div>

    <!-- Archiv -->
    <div id="archive-tab" class="tab">
      <div class="card">
        <div class="header">
          <h2>Archiv – erledigte Aufgaben</h2>
          <div class="pill">Archiviert aus Org/CS2 & allen Listen</div>
        </div>
        <div id="archive-list"></div>
      </div>
    </div>

    <!-- Teams -->
    <div id="teams-tab" class="tab">
      <div class="card">
        <div class="header">
          <h2>Teams</h2>
          <div class="pill">Team-Bild · Spieler · Ø Elo</div>
        </div>

        <div class="teams-layout">
          <div class="teams-left card">
            <div style="font-weight:700;margin-bottom:8px;">Team-Liste</div>
            <div id="team-list"></div>

            <div class="form">
              <input id="team-name" placeholder="Teamname" />
              <input id="team-img-url" placeholder="Bild-URL (optional)" />
              <button class="primary" id="add-team-btn">+ Team</button>
            </div>
          </div>

          <div class="teams-right card">
            <div class="team-head">
              <img id="team-img" class="team-img" alt="Teambild"/>
              <div>
                <div id="team-title" style="font-weight:800;">Kein Team ausgewählt</div>
                <div class="avg" id="team-avg">—</div>
              </div>
            </div>

            <div class="players" id="players"></div>

            <div class="form">
              <input id="p-ingame" placeholder="Ingame Name" />
              <input id="p-real" placeholder="Echter Name" />
              <input id="p-elo" placeholder="Elo" type="number"/>
              <input id="p-join" placeholder="Beitritt" type="date"/>
              <button class="primary" id="add-player-btn">+ Spieler</button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Vorlagen -->
    <div id="templates-tab" class="tab">
      <div class="card">
        <div class="header">
          <h2>Vorlagen</h2>
          <div class="pill">z.B. Wochenbericht</div>
        </div>

        <div class="tpl-grid" id="tpl-grid"></div>

        <div class="form">
          <input id="tpl-title" placeholder="Vorlagenname (z.B. Wochenbericht)" />
          <textarea id="tpl-content" placeholder="Vorlagentext..."></textarea>
          <button class="primary" id="add-tpl-btn">+ Vorlage</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Task Modal -->
  <div class="backdrop" id="task-backdrop">
    <div class="modal">
      <header>
        <h3 id="task-modal-title">Aufgabe</h3>
        <button class="close" id="task-close">×</button>
      </header>
      <div class="pill" id="task-modal-list">Liste: —</div>
      <div style="margin-top:8px;">
        <textarea id="task-modal-desc"></textarea>
      </div>
      <footer>
        <button class="primary" id="task-save">Speichern</button>
      </footer>
    </div>
  </div>

  <!-- Template Modal -->
  <div class="backdrop" id="tpl-backdrop">
    <div class="modal">
      <header>
        <h3 id="tpl-modal-title">Vorlage</h3>
        <button class="close" id="tpl-close">×</button>
      </header>
      <div style="margin-top:8px;">
        <textarea id="tpl-modal-content" readonly></textarea>
      </div>
      <footer>
        <button class="primary" id="tpl-close2">Schließen</button>
      </footer>
    </div>
  </div>

  <script>
    // ✅ Deine Supabase Daten
    const SUPABASE_URL = "https://bdbgenfksxbspkchakav.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_z188lmhx8TUaNan8fQGZzw_z3zwZ87o";
    const supa = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // Tabs
    const mainTabs = document.getElementById("main-tabs");
    const tabs = [
      { id: "boards-tab", label: "Boards", dot: true },
      { id: "archive-tab", label: "Archiv", dot: true },
      { id: "teams-tab", label: "Teams", dot: true },
      { id: "templates-tab", label: "Vorlagen", dot: true },
    ];

    function setActiveTab(id){
      document.querySelectorAll(".tab-btn").forEach(b=>b.classList.remove("active"));
      document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
      document.querySelector(`.tab-btn[data-target="${id}"]`).classList.add("active");
      document.getElementById(id).classList.add("active");
    }

    function renderMainTabs(){
      mainTabs.innerHTML = "";
      tabs.forEach((t,i)=>{
        const btn = document.createElement("button");
        btn.className = "tab-btn" + (i===0 ? " active":"");
        btn.dataset.target = t.id;
        btn.innerHTML = `<span class="dot"></span>${t.label}`;
        btn.addEventListener("click", ()=>{
          setActiveTab(t.id);
          if(t.id==="archive-tab") loadArchive();
          if(t.id==="templates-tab") loadTemplates();
          if(t.id==="teams-tab") loadTeams();
        });
        mainTabs.appendChild(btn);
      });
    }
    renderMainTabs();

    // Boards (Org/CS2) als Sub-Tabs in Boards-Tab
    let boards = [];
    let currentBoard = null;
    let lists = [];
    let tasksData = [];

    const boardTitleEl = document.getElementById("board-title");
    const boardEl = document.getElementById("board");
    const newListTitleEl = document.getElementById("new-list-title");
    const addListBtn = document.getElementById("add-list-btn");
    const newTaskTitleEl = document.getElementById("new-task-title");
    const newTaskDescEl = document.getElementById("new-task-desc");
    const newTaskListEl = document.getElementById("new-task-list");
    const addTaskBtn = document.getElementById("add-task-btn");

    // Task modal
    const taskBackdrop = document.getElementById("task-backdrop");
    const taskClose = document.getElementById("task-close");
    const taskSave = document.getElementById("task-save");
    const taskModalTitle = document.getElementById("task-modal-title");
    const taskModalList = document.getElementById("task-modal-list");
    const taskModalDesc = document.getElementById("task-modal-desc");
    let currentTask = null;

    taskClose.addEventListener("click", ()=> taskBackdrop.classList.remove("active"));
    taskBackdrop.addEventListener("click", (e)=>{ if(e.target===taskBackdrop) taskBackdrop.classList.remove("active"); });

    // Template modal
    const tplBackdrop = document.getElementById("tpl-backdrop");
    const tplClose = document.getElementById("tpl-close");
    const tplClose2 = document.getElementById("tpl-close2");
    const tplModalTitle = document.getElementById("tpl-modal-title");
    const tplModalContent = document.getElementById("tpl-modal-content");
    tplClose.addEventListener("click", ()=> tplBackdrop.classList.remove("active"));
    tplClose2.addEventListener("click", ()=> tplBackdrop.classList.remove("active"));
    tplBackdrop.addEventListener("click", (e)=>{ if(e.target===tplBackdrop) tplBackdrop.classList.remove("active"); });

    async function loadBoards(){
      const { data, error } = await supa.from("boards").select("*").order("position",{ascending:true});
      if(error){ alert("Boards laden fehlgeschlagen: "+error.message); return; }
      boards = data || [];
      if(!boards.length){ alert("Keine Boards gefunden. (SQL Seed prüfen)"); return; }
      currentBoard = currentBoard || boards[0];
      await loadBoardData();
      renderBoardSwitcher();
    }

    function renderBoardSwitcher(){
      // Board-Switcher als zusätzliche Reihe über dem Board
      let switcher = document.getElementById("board-switcher");
      if(!switcher){
        switcher = document.createElement("div");
        switcher.id = "board-switcher";
        switcher.className = "row";
        switcher.style.marginBottom = "10px";
        document.getElementById("boards-tab").prepend(switcher);
      }
      switcher.innerHTML = "";
      boards.forEach(b=>{
        const btn = document.createElement("button");
        btn.className = "tab-btn" + (currentBoard && b.id===currentBoard.id ? " active":"");
        btn.innerHTML = `<span class="dot"></span>${b.title}`;
        btn.addEventListener("click", async ()=>{
          currentBoard = b;
          await loadBoardData();
          renderBoardSwitcher();
        });
        switcher.appendChild(btn);
      });
    }

    async function loadBoardData(){
      boardTitleEl.textContent = currentBoard.title;

      const { data: listData, error: le } = await supa
        .from("lists").select("*")
        .eq("board_id", currentBoard.id)
        .order("position",{ascending:true});
      if(le){ alert("Listen laden fehlgeschlagen: "+le.message); return; }
      lists = listData || [];

      const { data: taskData, error: te } = await supa
        .from("tasks").select("*")
        .eq("board_id", currentBoard.id)
        .order("created_at",{ascending:true});
      if(te){ alert("Aufgaben laden fehlgeschlagen: "+te.message); return; }
      tasksData = taskData || [];

      renderBoard();
      fillListSelect();
    }

    function specialFromTitle(title){
      const t=(title||"").toLowerCase();
      if(t==="to do"||t==="todo") return "todo";
      if(t==="doing"||t==="in arbeit") return "doing";
      if(t==="done"||t==="erledigt") return "done";
      return "";
    }

    function renderBoard(){
      boardEl.innerHTML = "";
      lists.forEach(l=>{
        const col = document.createElement("div");
        col.className = "col";
        col.dataset.listId = l.id;
        const sp = specialFromTitle(l.title);
        if(sp) col.dataset.special = sp;

        const head = document.createElement("div");
        head.className = "col-head";
        const title = document.createElement("div");
        title.className = "col-title";
        title.textContent = l.title;
        const badge = document.createElement("div");
        badge.className = "badge";
        const count = tasksData.filter(t=>t.list_id===l.id).length;
        badge.textContent = count+" Karten";
        head.appendChild(title); head.appendChild(badge);

        const bucket = document.createElement("div");
        bucket.className = "tasks";
        bucket.addEventListener("dragover",(e)=>e.preventDefault());
        bucket.addEventListener("drop",(e)=>onTaskDrop(e,l));

        col.appendChild(head);
        col.appendChild(bucket);
        boardEl.appendChild(col);
      });

      tasksData.forEach(t=>addTaskCard(t));
    }

    function fillListSelect(){
      newTaskListEl.innerHTML = "";
      lists.forEach(l=>{
        const opt = document.createElement("option");
        opt.value = l.id;
        opt.textContent = l.title;
        newTaskListEl.appendChild(opt);
      });
      if(lists.length) newTaskListEl.value = lists[0].id;
    }

    function addTaskCard(task){
      const col = boardEl.querySelector(`.col[data-list-id="${task.list_id}"] .tasks`);
      if(!col) return;

      const card = document.createElement("div");
      card.className = "task";
      card.draggable = true;
      card.dataset.id = task.id;

      const top = document.createElement("div");
      top.className = "task-top";

      const tt = document.createElement("div");
      tt.className = "task-title";
      tt.textContent = task.title;

      const actions = document.createElement("div");
      actions.className = "task-actions";

      const arch = document.createElement("button");
      arch.className = "icon archive";
      arch.title = "Ins Archiv";
      arch.textContent = "📦";
      arch.addEventListener("click",(e)=>{ e.stopPropagation(); archiveTask(task); });

      const del = document.createElement("button");
      del.className = "icon danger";
      del.title = "Löschen";
      del.textContent = "🗑";
      del.addEventListener("click",(e)=>{ e.stopPropagation(); deleteTask(task); });

      actions.appendChild(arch);
      actions.appendChild(del);

      top.appendChild(tt);
      top.appendChild(actions);

      card.appendChild(top);

      if(task.description){
        const d = document.createElement("div");
        d.className = "task-desc";
        d.textContent = task.description;
        card.appendChild(d);
      }

      card.addEventListener("dragstart",(e)=>{
        e.dataTransfer.setData("text/plain", String(task.id));
      });

      // Popup öffnen
      card.addEventListener("click", ()=>{
        currentTask = task;
        taskModalTitle.textContent = task.title;
        const list = lists.find(x=>x.id===task.list_id);
        taskModalList.textContent = "Liste: " + (list ? list.title : "—");
        taskModalDesc.value = task.description || "";
        taskBackdrop.classList.add("active");
      });

      col.appendChild(card);
    }

    async function onTaskDrop(e, list){
      e.preventDefault();
      const id = parseInt(e.dataTransfer.getData("text/plain"),10);
      if(!id) return;

      const { error } = await supa.from("tasks")
        .update({ list_id: list.id, updated_at: new Date().toISOString() })
        .eq("id", id);

      if(error){ alert("Verschieben fehlgeschlagen: "+error.message); return; }

      const t = tasksData.find(x=>x.id===id);
      if(t) t.list_id = list.id;
      renderBoard();
    }

    taskSave.addEventListener("click", async ()=>{
      if(!currentTask) return;
      const newDesc = taskModalDesc.value;

      const { error } = await supa.from("tasks")
        .update({ description: newDesc, updated_at: new Date().toISOString() })
        .eq("id", currentTask.id);

      if(error){ alert("Speichern fehlgeschlagen: "+error.message); return; }

      currentTask.description = newDesc;
      taskBackdrop.classList.remove("active");
      renderBoard();
    });

    async function deleteTask(task){
      if(!confirm(`Aufgabe "${task.title}" wirklich löschen?`)) return;
      const { error } = await supa.from("tasks").delete().eq("id", task.id);
      if(error){ alert("Löschen fehlgeschlagen: "+error.message); return; }
      tasksData = tasksData.filter(t=>t.id!==task.id);
      renderBoard();
    }

    async function archiveTask(task){
      const fromList = lists.find(l=>l.id===task.list_id)?.title || null;

      const { error: ie } = await supa.from("archived_tasks").insert({
        board_id: currentBoard.id,
        title: task.title,
        description: task.description,
        from_list: fromList
      });
      if(ie){ alert("Archivieren fehlgeschlagen: "+ie.message); return; }

      const { error: de } = await supa.from("tasks").delete().eq("id", task.id);
      if(de){ alert("Vom Board entfernen fehlgeschlagen: "+de.message); return; }

      tasksData = tasksData.filter(t=>t.id!==task.id);
      renderBoard();
    }

    addListBtn.addEventListener("click", async ()=>{
      const title = newListTitleEl.value.trim();
      if(!title) return;

      const maxPos = lists.reduce((m,l)=>Math.max(m, l.position||0), 0);
      const { data, error } = await supa.from("lists").insert({
        board_id: currentBoard.id,
        title,
        position: maxPos + 1
      }).select().single();

      if(error){ alert("Liste erstellen fehlgeschlagen: "+error.message); return; }

      lists.push(data);
      newListTitleEl.value = "";
      renderBoard();
      fillListSelect();
    });

    addTaskBtn.addEventListener("click", async ()=>{
      const title = newTaskTitleEl.value.trim();
      const description = newTaskDescEl.value.trim();
      const list_id = parseInt(newTaskListEl.value,10);
      if(!title || !list_id){ alert("Bitte Titel & Liste wählen."); return; }

      const { data, error } = await supa.from("tasks").insert({
        board_id: currentBoard.id,
        list_id,
        title,
        description
      }).select().single();

      if(error){ alert("Aufgabe erstellen fehlgeschlagen: "+error.message); return; }

      tasksData.push(data);
      newTaskTitleEl.value = "";
      newTaskDescEl.value = "";
      renderBoard();
    });

    // Archiv
    const archiveList = document.getElementById("archive-list");
    async function loadArchive(){
      const { data, error } = await supa.from("archived_tasks").select("*").order("archived_at",{ascending:false});
      if(error){ alert("Archiv laden fehlgeschlagen: "+error.message); return; }

      archiveList.innerHTML = "";
      (data||[]).forEach(a=>{
        const div = document.createElement("div");
        div.className = "task";
        div.style.cursor="default";
        div.innerHTML = `
          <div class="task-top">
            <div class="task-title">${escapeHtml(a.title)}</div>
            <div class="pill">${a.from_list ? "aus: "+escapeHtml(a.from_list) : "—"}</div>
          </div>
          ${a.description ? `<div class="task-desc">${escapeHtml(a.description)}</div>`:""}
          <div style="margin-top:6px;color:var(--muted);font-size:.78rem;">
            Archiviert: ${a.archived_at ? new Date(a.archived_at).toLocaleString() : "-"}
          </div>
        `;
        archiveList.appendChild(div);
      });
    }

    // Templates
    const tplGrid = document.getElementById("tpl-grid");
    const tplTitle = document.getElementById("tpl-title");
    const tplContent = document.getElementById("tpl-content");
    const addTplBtn = document.getElementById("add-tpl-btn");

    async function loadTemplates(){
      const { data, error } = await supa.from("templates").select("*").order("created_at",{ascending:true});
      if(error){ alert("Vorlagen laden fehlgeschlagen: "+error.message); return; }

      tplGrid.innerHTML = "";
      (data||[]).forEach(t=>{
        const c = document.createElement("div");
        c.className = "tpl";
        c.innerHTML = `<div style="font-weight:800">${escapeHtml(t.title)}</div>
                       <div style="color:var(--muted);font-size:.8rem;margin-top:6px;">Klicken zum Öffnen</div>`;
        c.addEventListener("click", ()=>{
          tplModalTitle.textContent = t.title;
          tplModalContent.value = t.content || "";
          tplBackdrop.classList.add("active");
        });
        tplGrid.appendChild(c);
      });
    }

    addTplBtn.addEventListener("click", async ()=>{
      const title = tplTitle.value.trim();
      const content = tplContent.value.trim();
      if(!title) return;

      const { error } = await supa.from("templates").insert({ title, content });
      if(error){ alert("Vorlage speichern fehlgeschlagen: "+error.message); return; }

      tplTitle.value = "";
      tplContent.value = "";
      loadTemplates();
    });

    // Teams
    const teamList = document.getElementById("team-list");
    const addTeamBtn = document.getElementById("add-team-btn");
    const teamName = document.getElementById("team-name");
    const teamImgUrl = document.getElementById("team-img-url");

    const teamImg = document.getElementById("team-img");
    const teamTitle = document.getElementById("team-title");
    const teamAvg = document.getElementById("team-avg");
    const playersEl = document.getElementById("players");

    const addPlayerBtn = document.getElementById("add-player-btn");
    const pIngame = document.getElementById("p-ingame");
    const pReal = document.getElementById("p-real");
    const pElo = document.getElementById("p-elo");
    const pJoin = document.getElementById("p-join");

    let teams = [];
    let currentTeam = null;

    async function loadTeams(){
      const { data, error } = await supa.from("teams").select("*").order("position",{ascending:true});
      if(error){ alert("Teams laden fehlgeschlagen: "+error.message); return; }
      teams = data || [];
      renderTeams();
      if(!currentTeam && teams.length){
        selectTeam(teams[0]);
      } else if(currentTeam){
        selectTeam(teams.find(t=>t.id===currentTeam.id) || teams[0] || null);
      }
    }

    function renderTeams(){
      teamList.innerHTML = "";
      teams.forEach(t=>{
        const div = document.createElement("div");
        div.className = "team-item" + (currentTeam && t.id===currentTeam.id ? " active":"");
        div.innerHTML = `<span>${escapeHtml(t.name)}</span><span class="badge">Team</span>`;
        div.addEventListener("click", ()=>selectTeam(t));
        teamList.appendChild(div);
      });
    }

    async function selectTeam(team){
      currentTeam = team;
      renderTeams();
      if(!team){
        teamTitle.textContent="Kein Team ausgewählt";
        teamAvg.textContent="—";
        playersEl.innerHTML="";
        return;
      }
      teamTitle.textContent = team.name;
      if(team.image_url){ teamImg.src = team.image_url; } else { teamImg.removeAttribute("src"); }

      const { data, error } = await supa.from("players").select("*")
        .eq("team_id", team.id).order("updated_at",{ascending:false});
      if(error){ alert("Spieler laden fehlgeschlagen: "+error.message); return; }

      playersEl.innerHTML = "";
      let sum=0, cnt=0;

      (data||[]).forEach(p=>{
        if(p.elo!=null){ sum+=p.elo; cnt++; }
        const card = document.createElement("div");
        card.className = "player";
        card.innerHTML = `
          <strong>${escapeHtml(p.ingame_name)}</strong>
          <div>${p.real_name ? escapeHtml(p.real_name) : ""}</div>
          <small>Elo: ${p.elo!=null ? p.elo : "-"}</small><br/>
          <small>Beitritt: ${p.join_date || "-"}</small><br/>
          <small>Zuletzt: ${p.updated_at ? new Date(p.updated_at).toLocaleDateString() : "-"}</small>
        `;
        playersEl.appendChild(card);
      });

      teamAvg.textContent = cnt ? `Spieler: ${(data||[]).length} · Ø Elo: ${Math.round(sum/cnt)}` : `Spieler: ${(data||[]).length} · keine Elo-Daten`;
    }

    addTeamBtn.addEventListener("click", async ()=>{
      const name = teamName.value.trim();
      const image_url = teamImgUrl.value.trim() || null;
      if(!name) return;

      const maxPos = teams.reduce((m,t)=>Math.max(m, t.position||0), 0);
      const { data, error } = await supa.from("teams")
        .insert({ name, image_url, position: maxPos + 1 })
        .select().single();

      if(error){ alert("Team erstellen fehlgeschlagen: "+error.message); return; }
      teamName.value=""; teamImgUrl.value="";
      teams.push(data);
      selectTeam(data);
    });

    addPlayerBtn.addEventListener("click", async ()=>{
      if(!currentTeam){ alert("Bitte zuerst ein Team auswählen."); return; }
      const ingame_name = pIngame.value.trim();
      const real_name = pReal.value.trim() || null;
      const elo = pElo.value.trim() ? parseInt(pElo.value.trim(),10) : null;
      const join_date = pJoin.value || null;
      if(!ingame_name) return;

      const { error } = await supa.from("players").insert({
        team_id: currentTeam.id,
        ingame_name, real_name, elo, join_date
      });
      if(error){ alert("Spieler erstellen fehlgeschlagen: "+error.message); return; }

      pIngame.value=""; pReal.value=""; pElo.value=""; pJoin.value="";
      selectTeam(currentTeam);
    });

    // Utils
    function escapeHtml(s){
      return String(s ?? "").replace(/[&<>"']/g, c => ({
        "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"
      }[c]));
    }

    // Start
    loadBoards();
  </script>
</body>
</html>
